<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Autonomy Globe · 全球需求雷达</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at center, #0a1929 0%, #000000 100%);
    color: #e3f2fd;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    height: 100vh;
  }
  #globe-container {
    position: absolute;
    top: 0; left: 0;
    width: 60%; height: 100%;
  }
  #panel {
    position: absolute;
    top: 20px; right: 20px;
    width: 38%; height: calc(100% - 40px);
    background: rgba(10, 25, 41, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(64, 196, 255, 0.3);
    border-radius: 12px;
    padding: 18px;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 22px;
    color: #40c4ff;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pulse-dot {
    width: 10px; height: 10px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 12px #00e676;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity:1; }
    50% { transform: scale(1.4); opacity:0.5; }
  }
  .subtitle {
    color: #90a4ae;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: rgba(64, 196, 255, 0.08);
    border: 1px solid rgba(64, 196, 255, 0.2);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-num {
    font-size: 20px;
    font-weight: bold;
    color: #40c4ff;
  }
  .stat-label {
    font-size: 10px;
    color: #90a4ae;
    margin-top: 2px;
  }
  .demand-item {
    background: rgba(255,255,255,0.03);
    border-left: 3px solid #40c4ff;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 8px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .demand-item:hover {
    background: rgba(64, 196, 255, 0.12);
    transform: translateX(-4px);
  }
  .demand-item.high { border-left-color: #ff5252; }
  .demand-item.mid { border-left-color: #ffb74d; }
  .demand-item.low { border-left-color: #66bb6a; }
  .demand-title {
    font-size: 13px;
    font-weight: 600;
    color: #e3f2fd;
    margin-bottom: 4px;
  }
  .demand-meta {
    font-size: 10px;
    color: #90a4ae;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(64, 196, 255, 0.15);
    padding: 2px 6px;
    border-radius: 3px;
    color: #40c4ff;
  }
  .tag.score-high { background: rgba(255, 82, 82, 0.2); color: #ff8a80; }
  .tag.score-mid  { background: rgba(255, 183, 77, 0.2); color: #ffd180; }
  .tag.score-low  { background: rgba(102, 187, 106, 0.2); color: #b9f6ca; }
  .log-stream {
    margin-top: 12px;
    background: #000;
    border: 1px solid #1a3a5c;
    border-radius: 6px;
    padding: 8px;
    height: 160px;
    overflow-y: auto;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .log-line { margin-bottom: 2px; }
  .log-time { color: #607d8b; }
  .log-msg { color: #b0bec5; }
  .log-msg.info { color: #40c4ff; }
  .log-msg.success { color: #00e676; }
  .log-msg.warn { color: #ffb74d; }
  .log-msg.error { color: #ff5252; }
  #panel::-webkit-scrollbar,
  .log-stream::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb,
  .log-stream::-webkit-scrollbar-thumb { background: #40c4ff; border-radius: 3px; }
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: rgba(64, 196, 255, 0.1);
    border: 1px solid rgba(64, 196, 255, 0.3);
    color: #40c4ff;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #40c4ff;
    color: #000;
  }
</style>
</head>
<body>
<div id="globe-container"></div>
<div id="panel">
  <h1><span class="pulse-dot"></span>AI Autonomy Radar · 全球需求雷达</h1>
  <div class="subtitle">实时扫描全球AI高价值需求 · 自动对接 · 自动开发 · 自动收款</div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-scan">0</div>
      <div class="stat-label">已扫描</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-match">0</div>
      <div class="stat-label">匹配需求</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-contact">0</div>
      <div class="stat-label">已对接</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-revenue">$0</div>
      <div class="stat-label">累计收款</div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-btn active" data-region="all">全部</div>
    <div class="filter-btn" data-region="北美">北美</div>
    <div class="filter-btn" data-region="欧洲">欧洲</div>
    <div class="filter-btn" data-region="亚洲">亚洲</div>
    <div class="filter-btn" data-region="中东">中东</div>
    <div class="filter-btn" data-region="南美">南美</div>
  </div>

  <div id="demand-list"></div>

  <div class="log-stream" id="log-stream"></div>
</div>

<script src="/static/js/three.min.js"></script>
<script src="/static/js/OrbitControls.js"></script>
<script>
// ===== 3D 地球 (本地纹理降级, 离线也能转) =====
const container = document.getElementById('globe-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0, 280);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);
console.log('[Radar] Canvas appended to container');

// 暴露给 OrbitControls (必须在 appendChild 之后, 否则它拿不到 domElement)
window.__camera = camera;
window.__renderer = renderer;

const controls = { update: () => {} };
window.__OrbitControls = controls; // 让 OrbitControls.js 能挂载事件
// 等 OrbitControls.js 初始化完成 (它会替换 window.__OrbitControls.update)
setTimeout(() => {
  if (window.__OrbitControls && window.__OrbitControls.updateCamera) {
    Object.assign(controls, window.__OrbitControls);
    console.log('[Radar] OrbitControls linked');
  }
}, 100);
// 手写控制器已在 /static/js/OrbitControls.js 初始化

// 星空
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 1000;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));

// 加载真实地球贴图 (NASA Blue Marble)
const texLoader = new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');
const texEarth = texLoader.load('/static/textures/earth-blue-marble.jpg');
const texBump = texLoader.load('/static/textures/earth-topology.png');
const texSpec = texLoader.load('/static/textures/earth-water.png');

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(80, 64, 64),
  new THREE.MeshPhongMaterial({
    map: texEarth,
    bumpMap: texBump,
    bumpScale: 0.8,
    specularMap: texSpec,
    specular: new THREE.Color(0x333344),
    shininess: 12
  })
);
scene.add(earth);
window.__earth = earth;

// 大气层
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(85, 64, 64),
  new THREE.ShaderMaterial({
    vertexShader: `varying vec3 vNormal; void main(){ vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vNormal; void main(){ float intensity=pow(0.7-dot(vNormal,vec3(0.0,0.0,1.0)),2.0); gl_FragColor=vec4(0.3,0.6,1.0,1.0)*intensity; }`,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    transparent: true
  })
);
scene.add(atmosphere);

scene.add(new THREE.AmbientLight(0x404040, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(200, 100, 200);
scene.add(sun);

// 需求点（城市坐标）
const cityCoords = {
  '旧金山':[-122.4194,37.7749],'纽约':[-74.0060,40.7128],'洛杉矶':[-118.2437,34.0522],
  '多伦多':[-79.3832,43.6532],'西雅图':[-122.3321,47.6062],'芝加哥':[-87.6298,41.8781],
  '伦敦':[-0.1276,51.5074],'巴黎':[2.3522,48.8566],'柏林':[13.4050,52.5200],
  '阿姆斯特丹':[4.9041,52.3676],'苏黎世':[8.5417,47.3769],'斯德哥尔摩':[18.0686,59.3293],
  '东京':[139.6503,35.6762],'首尔':[126.9780,37.5665],'新加坡':[103.8198,1.3521],
  '香港':[114.1694,22.3193],'上海':[121.4737,31.2304],'孟买':[72.8777,19.0760],
  '迪拜':[55.2708,25.2048],'特拉维夫':[34.7818,32.0853],'利雅得':[46.6753,24.7136],
  '圣保罗':[-46.6333,-23.5505],'墨西哥城':[-99.1332,19.4326],'布宜诺斯艾利斯':[-58.3816,-34.6037],
  '悉尼':[151.2093,-33.8688],'墨尔本':[144.9631,-37.8136]
};

function latLonToVec3(lat, lon, r=80) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

// 需求脉冲点
const pulses = [];
function addPulse(cityName, color=0x40c4ff) {
  const coord = cityCoords[cityName];
  if (!coord) return;
  const pos = latLonToVec3(coord[1], coord[0], 80);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 8, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  mesh.position.copy(pos);
  earth.add(mesh);
  // 光晕环
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.5, 2, 32),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
  );
  ring.position.copy(pos);
  ring.lookAt(0, 0, 0);
  earth.add(ring);
  pulses.push({ mesh, ring, age: 0, maxAge: 180 });

  // 连线（城市到波士顿中心示意）
  const lineGeo = new THREE.BufferGeometry().setFromPoints([pos, new THREE.Vector3(0,0,0)]);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.15 }));
  earth.add(line);
  setTimeout(() => earth.remove(line), 4000);
}

function animate() {
  requestAnimationFrame(animate);
  earth.rotation.y += 0.0015;
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.age++;
    const t = p.age / p.maxAge;
    p.mesh.scale.setScalar(1 + t * 1.5);
    p.ring.scale.setScalar(1 + t * 3);
    p.ring.material.opacity = 0.8 * (1 - t);
    if (p.age >= p.maxAge) {
      earth.remove(p.mesh);
      earth.remove(p.ring);
      pulses.splice(i, 1);
    }
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ===== 实时数据流 =====
let allDemands = [];
let stats = { scan: 0, match: 0, contact: 0, revenue: 0 };

function log(msg, type='info') {
  const el = document.getElementById('log-stream');
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  el.innerHTML = `<div class="log-line"><span class="log-time">[${t}]</span> <span class="log-msg ${type}">${msg}</span></div>` + el.innerHTML;
  if (el.children.length > 200) el.removeChild(el.lastChild);
}

function renderDemands() {
  const filter = document.querySelector('.filter-btn.active')?.dataset.region || 'all';
  const list = allDemands.filter(d => filter === 'all' || d.region === filter).slice(0, 30);
  const html = list.map(d => {
    const scoreClass = d.score >= 80 ? 'high' : d.score >= 50 ? 'mid' : 'low';
    const scoreTagClass = d.score >= 80 ? 'score-high' : d.score >= 50 ? 'score-mid' : 'score-low';
    return `<div class="demand-item ${scoreClass}">
      <div class="demand-title">${d.title}</div>
      <div class="demand-meta">
        <span class="tag">📍 ${d.region} · ${d.city}</span>
        <span class="tag ${scoreTagClass}">价值 ${d.score}</span>
        <span class="tag">${d.category}</span>
        <span class="tag">${d.status}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('demand-list').innerHTML = html;
}

function updateStats() {
  document.getElementById('stat-scan').textContent = stats.scan;
  document.getElementById('stat-match').textContent = stats.match;
  document.getElementById('stat-contact').textContent = stats.contact;
  document.getElementById('stat-revenue').textContent = '$' + stats.revenue;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDemands();
  });
});

// SSE 流
function connectSSE() {
  const es = new EventSource('/api/stream');
  es.addEventListener('scan', e => {
    const d = JSON.parse(e.data);
    stats.scan++;
    if (d.match) {
      stats.match++;
      allDemands.unshift(d);
      if (allDemands.length > 100) allDemands = allDemands.slice(0, 100);
      const color = d.score >= 80 ? 0xff5252 : d.score >= 50 ? 0xffb74d : 0x40c4ff;
      addPulse(d.city, color);
      renderDemands();
    }
    if (d.contact) stats.contact++;
    if (d.revenue) stats.revenue += d.revenue;
    updateStats();
  });
  es.addEventListener('log', e => {
    const m = JSON.parse(e.data);
    log(m.msg, m.type);
  });
  es.onerror = () => { log('连接断开，3秒后重连...', 'warn'); setTimeout(connectSSE, 3000); es.close(); };
}
// 延后 SSE 连接, 等地球纹理加载完成 (避免页面卡死判定)
function startSSE() {
  try { connectSSE(); } catch(e) { console.warn('SSE error:', e); }
}
// URL ?nosse=1 跳过 SSE (用于 headless 截图测试)
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('nosse') === '1') {
  console.log('[Radar] SSE skipped (nosse=1)');
} else if (typeof texLoader !== 'undefined') {
  Promise.all([
    new Promise(r => texLoader.load('/static/textures/earth-blue-marble.jpg', r, undefined, ()=>r())),
    new Promise(r => texLoader.load('/static/textures/earth-topology.png', r, undefined, ()=>r())),
  ]).then(() => setTimeout(startSSE, 500));
} else {
  setTimeout(startSSE, 500);
}

log('AI Autonomy Radar 已启动', 'success');
log('正在接入全球需求源...', 'info');
</script>
</body>
</html>
