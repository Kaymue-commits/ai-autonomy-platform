<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS RADAR · 全球多维情报指挥中心</title>
<style>
/* ===== 字体导入 ===== */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  background: #02030a;
  color: #d4f1f9;
  font-family: 'Rajdhani', 'Microsoft YaHei', sans-serif;
  position: relative;
}

/* 全局背景网格 + 暗角 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 1;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
  z-index: 2;
}

/* ===== 3D 地球容器 ===== */
#globe-container {
  position: fixed;
  top: 70px; left: 0;
  width: 100%; height: calc(100% - 70px);
  z-index: 0;
}

/* ===== 顶部 HUD ===== */
.hud-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 70px;
  background: linear-gradient(180deg, rgba(2,8,20,0.95), rgba(2,8,20,0.7));
  border-bottom: 1px solid rgba(0,229,255,0.3);
  display: flex; align-items: center;
  padding: 0 24px;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.hud-top::before {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #00e5ff 30%, #ff00e6 50%, #00e5ff 70%, transparent);
  animation: scan-line 4s linear infinite;
}
@keyframes scan-line {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.brand {
  display: flex; align-items: center; gap: 14px;
}
.brand-logo {
  width: 42px; height: 42px;
  position: relative;
}
.brand-logo::before, .brand-logo::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px solid #00e5ff;
  border-radius: 50%;
  border-top-color: transparent;
  border-left-color: transparent;
  animation: spin 3s linear infinite;
}
.brand-logo::after {
  inset: 6px;
  border-color: #ff00e6;
  border-top-color: transparent;
  border-right-color: transparent;
  animation: spin 2s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }
.brand-text {
  font-family: 'Orbitron', sans-serif;
}
.brand-name {
  font-size: 22px; font-weight: 900;
  background: linear-gradient(90deg, #00e5ff, #ff00e6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.brand-sub {
  font-size: 10px;
  color: #5d8fa8;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.hud-stats {
  display: flex; gap: 28px;
  margin-left: auto;
  margin-right: 20px;
}
.hud-stat {
  text-align: right;
  min-width: 80px;
}
.hud-stat-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; font-weight: 700;
  color: #00e5ff;
  text-shadow: 0 0 8px rgba(0,229,255,0.6);
  line-height: 1;
}
.hud-stat-val.danger { color: #ff3d6e; text-shadow: 0 0 8px rgba(255,61,110,0.6); }
.hud-stat-val.warn { color: #ffb74d; text-shadow: 0 0 8px rgba(255,183,77,0.6); }
.hud-stat-val.success { color: #00ff9f; text-shadow: 0 0 8px rgba(0,255,159,0.6); }
.hud-stat-label {
  font-size: 9px;
  color: #5d8fa8;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}
.hud-time {
  font-family: 'Share Tech Mono', monospace;
  color: #00e5ff;
  font-size: 14px;
  letter-spacing: 1px;
  text-align: right;
}
.hud-time-label {
  font-size: 9px;
  color: #5d8fa8;
  letter-spacing: 2px;
}

/* ===== 左侧模块导航 ===== */
.sidebar {
  position: fixed;
  top: 90px; left: 16px;
  width: 80px;
  z-index: 50;
  display: flex; flex-direction: column;
  gap: 8px;
}
.nav-module {
  position: relative;
  width: 80px; height: 80px;
  background: rgba(2,8,20,0.7);
  border: 1px solid rgba(0,229,255,0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.nav-module::before {
  content: '';
  position: absolute;
  top: 4px; left: 4px; right: 4px; bottom: 4px;
  border: 1px solid transparent;
  clip-path: inherit;
  pointer-events: none;
}
.nav-module:hover {
  border-color: rgba(0,229,255,0.6);
  background: rgba(0,229,255,0.08);
  transform: translateX(3px);
}
.nav-module.active {
  border-color: var(--mod-color, #00e5ff);
  background: rgba(0,229,255,0.12);
  box-shadow: 0 0 20px var(--mod-color, #00e5ff), inset 0 0 20px rgba(0,229,255,0.1);
}
.nav-module.active::after {
  content: '';
  position: absolute;
  left: -8px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 30px;
  background: var(--mod-color, #00e5ff);
  box-shadow: 0 0 12px var(--mod-color, #00e5ff);
}
.nav-icon {
  font-size: 26px;
  filter: drop-shadow(0 0 4px currentColor);
  color: var(--mod-color, #00e5ff);
}
.nav-name {
  font-size: 10px;
  color: #d4f1f9;
  margin-top: 4px;
  letter-spacing: 1px;
}
.nav-module.active .nav-name {
  color: var(--mod-color, #00e5ff);
}

/* ===== 右侧主面板 ===== */
.main-panel {
  position: fixed;
  top: 90px; right: 16px;
  width: 460px;
  height: calc(100% - 130px);
  background: rgba(2,8,20,0.75);
  border: 1px solid rgba(0,229,255,0.25);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 50;
  display: flex; flex-direction: column;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
}
.main-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--mod-color, #00e5ff), transparent);
  opacity: 0.7;
}

.panel-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,229,255,0.15);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 3px;
  color: var(--mod-color, #00e5ff);
  text-transform: uppercase;
  text-shadow: 0 0 8px var(--mod-color, #00e5ff);
}
.panel-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px;
  color: #00ff9f;
  letter-spacing: 1px;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00ff9f;
  box-shadow: 0 0 6px #00ff9f;
  animation: blink 1.5s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,229,255,0.4) transparent;
}
.panel-body::-webkit-scrollbar { width: 6px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.4); border-radius: 3px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }

/* ===== 面板内容样式 ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.kpi-card {
  background: linear-gradient(135deg, rgba(0,229,255,0.06), rgba(0,229,255,0.02));
  border: 1px solid rgba(0,229,255,0.2);
  padding: 10px 12px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--mod-color, #00e5ff);
}
.kpi-label {
  font-size: 9px;
  color: #5d8fa8;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.kpi-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; font-weight: 700;
  color: var(--mod-color, #00e5ff);
  text-shadow: 0 0 6px var(--mod-color, #00e5ff);
}
.kpi-trend {
  font-size: 10px;
  margin-top: 2px;
  color: #5d8fa8;
}
.kpi-trend.up { color: #00ff9f; }
.kpi-trend.down { color: #ff3d6e; }

/* 数据列表项 */
.data-list {
  display: flex; flex-direction: column;
  gap: 6px;
}
.data-row {
  background: rgba(0,229,255,0.04);
  border-left: 2px solid var(--mod-color, #00e5ff);
  padding: 10px 12px;
  transition: all 0.3s;
  cursor: pointer;
  position: relative;
}
.data-row:hover {
  background: rgba(0,229,255,0.1);
  transform: translateX(-3px);
}
.data-row.critical { border-left-color: #ff3d6e; }
.data-row.elevated { border-left-color: #ffb74d; }
.data-row.moderate { border-left-color: #00e5ff; }
.data-row.low { border-left-color: #66bb6a; }

.data-title {
  font-size: 13px; font-weight: 600;
  color: #e3f2fd;
  margin-bottom: 4px;
  line-height: 1.3;
}
.data-meta {
  display: flex; gap: 8px; flex-wrap: wrap;
  font-size: 10px;
  color: #5d8fa8;
}
.tag {
  background: rgba(0,229,255,0.12);
  padding: 1px 6px;
  border-radius: 2px;
  color: #00e5ff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
}
.tag.danger { background: rgba(255,61,110,0.18); color: #ff3d6e; }
.tag.warn { background: rgba(255,183,77,0.18); color: #ffb74d; }
.tag.success { background: rgba(0,255,159,0.18); color: #00ff9f; }
.tag.purple { background: rgba(179,136,255,0.18); color: #b388ff; }

/* 表格行 */
.table-row {
  display: grid;
  grid-template-columns: 60px 1fr 100px 80px;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(0,229,255,0.08);
  font-size: 12px;
  transition: background 0.2s;
}
.table-row:hover { background: rgba(0,229,255,0.06); }
.table-row.header {
  font-size: 10px;
  letter-spacing: 1px;
  color: #5d8fa8;
  text-transform: uppercase;
  background: rgba(0,229,255,0.05);
  border-bottom: 1px solid rgba(0,229,255,0.2);
}
.price-up { color: #00ff9f; }
.price-down { color: #ff3d6e; }
.price { font-family: 'Share Tech Mono', monospace; font-weight: 600; }

/* 能源流可视化 */
.energy-flow {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  margin: 12px 0;
}
.energy-node {
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.2);
  padding: 10px 6px;
  text-align: center;
  position: relative;
}
.energy-node-label {
  font-size: 9px;
  color: #5d8fa8;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.energy-node-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #ffd54f;
  text-shadow: 0 0 4px #ffd54f;
}
.energy-node.solar .energy-node-val { color: #ffca28; text-shadow: 0 0 4px #ffca28; }
.energy-node.battery .energy-node-val { color: #42a5f5; text-shadow: 0 0 4px #42a5f5; }
.energy-node.grid .energy-node-val { color: #b388ff; text-shadow: 0 0 4px #b388ff; }
.energy-node.load .energy-node-val { color: #ff8a80; text-shadow: 0 0 4px #ff8a80; }

/* CII 指数横向条 */
.cii-row {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 4px;
  font-size: 11px;
}
.cii-name { width: 70px; color: #d4f1f9; }
.cii-bar {
  flex: 1;
  height: 8px;
  background: rgba(0,229,255,0.08);
  position: relative;
  overflow: hidden;
}
.cii-fill {
  height: 100%;
  background: linear-gradient(90deg, #00e5ff, #ff00e6);
  box-shadow: 0 0 8px currentColor;
}
.cii-val {
  width: 30px; text-align: right;
  font-family: 'Share Tech Mono', monospace;
  color: #00e5ff;
}

/* 雷达扫描装饰 */
.scan-decor {
  position: fixed;
  pointer-events: none;
  z-index: 3;
}
.scan-decor.tl { top: 70px; left: 0; width: 120px; height: 120px;
  border-top: 2px solid rgba(0,229,255,0.4);
  border-left: 2px solid rgba(0,229,255,0.4);
  clip-path: polygon(0 0, 100% 0, 0 100%);
}
.scan-decor.tr { top: 70px; right: 0; width: 120px; height: 120px;
  border-top: 2px solid rgba(0,229,255,0.4);
  border-right: 2px solid rgba(0,229,255,0.4);
}
.scan-decor.bl { bottom: 0; left: 0; width: 120px; height: 120px;
  border-bottom: 2px solid rgba(0,229,255,0.4);
  border-left: 2px solid rgba(0,229,255,0.4);
}
.scan-decor.br { bottom: 0; right: 0; width: 120px; height: 120px;
  border-bottom: 2px solid rgba(0,229,255,0.4);
  border-right: 2px solid rgba(0,229,255,0.4);
}

/* ===== 底部状态栏 ===== */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(0deg, rgba(2,8,20,0.95), rgba(2,8,20,0.7));
  border-top: 1px solid rgba(0,229,255,0.3);
  z-index: 80;
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.status-bar::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #00e5ff 30%, #ff00e6 50%, #00e5ff 70%, transparent);
}
.status-left {
  display: flex; gap: 16px;
  align-items: center;
  font-size: 11px;
  color: #5d8fa8;
  font-family: 'Share Tech Mono', monospace;
}
.status-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 2px;
  letter-spacing: 1px;
}
.log-ticker {
  flex: 1;
  height: 26px;
  overflow: hidden;
  position: relative;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #d4f1f9;
  display: flex; align-items: center;
  padding-left: 12px;
  border-left: 1px solid rgba(0,229,255,0.2);
}
.log-ticker-line {
  white-space: nowrap;
  animation: scroll-left 30s linear infinite;
}
@keyframes scroll-left {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
.log-ticker-line .lt-time { color: #5d8fa8; margin-right: 6px; }
.log-ticker-line .lt-msg.success { color: #00ff9f; }
.log-ticker-line .lt-msg.warn { color: #ffb74d; }
.log-ticker-line .lt-msg.error { color: #ff3d6e; }
.log-ticker-line .lt-msg.info { color: #00e5ff; }
.log-ticker-line .lt-sep { color: #5d8fa8; margin: 0 12px; }

/* 雷达扫描波纹 */
.radar-pulse {
  position: absolute;
  border: 2px solid var(--mod-color, #00e5ff);
  border-radius: 50%;
  opacity: 0;
  animation: radar-out 4s ease-out infinite;
  pointer-events: none;
}
@keyframes radar-out {
  0% { width: 0; height: 0; opacity: 0.8; }
  100% { width: 600px; height: 600px; opacity: 0; }
}

/* 通用 utility */
.empty {
  text-align: center;
  color: #5d8fa8;
  font-size: 12px;
  padding: 40px 0;
  letter-spacing: 2px;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: #5d8fa8;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 14px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(0,229,255,0.15);
  display: flex; align-items: center; gap: 6px;
}
.section-title::before {
  content: '';
  width: 4px; height: 10px;
  background: var(--mod-color, #00e5ff);
}

/* 隐藏滚动 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 3px; }
</style>
</head>
<body>

<!-- 3D 地球 -->
<div id="globe-container"></div>

<!-- 装饰角 -->
<div class="scan-decor tl"></div>
<div class="scan-decor tr"></div>
<div class="scan-decor bl"></div>
<div class="scan-decor br"></div>

<!-- 顶部 HUD -->
<header class="hud-top">
  <div class="brand">
    <div class="brand-logo"></div>
    <div class="brand-text">
      <div class="brand-name">NEXUS RADAR</div>
      <div class="brand-sub">Global Multi-Source Intelligence Center</div>
    </div>
  </div>
  <div class="hud-stats">
    <div class="hud-stat">
      <div class="hud-stat-val" id="hud-demands">0</div>
      <div class="hud-stat-label">DEMANDS</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-val warn" id="hud-threat">L1</div>
      <div class="hud-stat-label">THREAT LV</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-val success" id="hud-revenue">$0</div>
      <div class="hud-stat-label">REVENUE</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-val" id="hud-sources">0</div>
      <div class="hud-stat-label">SOURCES</div>
    </div>
  </div>
  <div>
    <div class="hud-time" id="hud-time">00:00:00</div>
    <div class="hud-time-label" style="text-align:right;font-size:9px;color:#5d8fa8;letter-spacing:2px;">UTC</div>
  </div>
</header>

<!-- 左侧模块导航 -->
<aside class="sidebar" id="sidebar"></aside>

<!-- 右侧主面板 -->
<section class="main-panel" id="main-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">DEMAND RADAR</div>
    <div class="panel-status">
      <span class="status-dot"></span>
      <span>LIVE</span>
    </div>
  </div>
  <div class="panel-body" id="panel-body">
    <div class="empty">初始化中...</div>
  </div>
</section>

<!-- 底部状态栏 -->
<footer class="status-bar">
  <div class="status-left">
    <div class="status-chip">● ONLINE</div>
    <div class="status-chip" id="status-fps">60 FPS</div>
    <div class="status-chip">LAT 35.0° N</div>
    <div class="status-chip" id="status-modules">9 MODULES</div>
  </div>
  <div class="log-ticker">
    <div class="log-ticker-line" id="log-ticker"></div>
  </div>
</footer>

<script src="/static/js/three.min.js"></script>
<script src="/static/js/OrbitControls.js"></script>
<script>
// ============================================================
// 3D 地球初始化
// ============================================================
const container = document.getElementById('globe-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
camera.position.set(0, 0, 280);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = { update: () => {} };
window.__camera = camera;
window.__renderer = renderer;
window.__OrbitControls = controls;
setTimeout(() => {
  if (window.__OrbitControls && window.__OrbitControls.updateCamera) {
    Object.assign(controls, window.__OrbitControls);
  }
}, 100);

// 星空背景
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3]   = (Math.random() - 0.5) * 1500;

function latLonToVec3(lat, lon, r=EARTH_RADIUS) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// 需求脉冲点
const pulses = [];
function addPulse(lat, lon, color=0x00e5ff) {
  if (!lat || !lon) return;
  const pos = latLonToVec3(lat, lon, EARTH_RADIUS);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 10, 10),
    new THREE.MeshBasicMaterial({ color })
  );
  mesh.position.copy(pos);
  earth.add(mesh);
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(2, 3, 32),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
  );
  ring.position.copy(pos);
  ring.lookAt(0, 0, 0);
  earth.add(ring);
  pulses.push({ mesh, ring, age: 0, maxAge: 200 });

  // 连线到地球中心
  const lineGeo = new THREE.BufferGeometry().setFromPoints([pos, new THREE.Vector3(0,0,0)]);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.25 }));
  earth.add(line);
  setTimeout(() => earth.remove(line), 4000);
}

// 持续热点（OSINT 冲突点）
const persistentHotspots = [];
function addPersistentHotspot(lat, lon, color=0xff3d6e, intensity=90) {
  if (!lat || !lon) return;
  const pos = latLonToVec3(lat, lon, EARTH_RADIUS);
  // 中心点
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 8, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  mesh.position.copy(pos);
  earth.add(mesh);
  // 持续脉冲环
  const rings = [];
  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(1.8, 2.5, 32),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
    );
    ring.position.copy(pos);
    ring.lookAt(0, 0, 0);
    earth.add(ring);
    rings.push({ ring, phase: i / 3 });
  }
  persistentHotspots.push({ mesh, rings, intensity, color });
}

// 航班轨迹线
const flightLines = [];
function addFlightLine(lat1, lon1, lat2, lon2, color=0x00ff9f) {
  if (!lat1 || !lat2) return;
  const v1 = latLonToVec3(lat1, lon1, EARTH_RADIUS);
  const v2 = latLonToVec3(lat2, lon2, EARTH_RADIUS);
  const mid = v1.clone().add(v2).multiplyScalar(0.5);
  mid.normalize().multiplyScalar(EARTH_RADIUS + 25);
  const curve = new THREE.QuadraticBezierCurve3(v1, mid, v2);
  const points = curve.getPoints(50);
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 }));
  earth.add(line);
  flightLines.push({ line, age: 0, maxAge: 240 });
}

function clearPersistentHotspots() {
  persistentHotspots.forEach(h => {
    earth.remove(h.mesh);
    h.rings.forEach(r => earth.remove(r.ring));
  });
  persistentHotspots.length = 0;
}

function clearFlightLines() {
  flightLines.forEach(f => earth.remove(f.line));
  flightLines.length = 0;
}

// FPS 计数
let frameCount = 0, lastFpsTime = performance.now(), currentFps = 60;
function animate() {
  requestAnimationFrame(animate);
  earth.rotation.y += 0.0012;
  // 临时脉冲
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.age++;
    const t = p.age / p.maxAge;
    p.mesh.scale.setScalar(1 + t * 1.8);
    p.ring.scale.setScalar(1 + t * 3.5);
    p.ring.material.opacity = 0.9 * (1 - t);
    if (p.age >= p.maxAge) {
      earth.remove(p.mesh); earth.remove(p.ring);
      pulses.splice(i, 1);
    }
  }
  // 持续热点
  persistentHotspots.forEach(h => {
    h.rings.forEach(r => {
      r.phase = (r.phase + 0.005) % 1;
      r.ring.scale.setScalar(1 + r.phase * 4);
      r.ring.material.opacity = 0.7 * (1 - r.phase);
    });
  });
  controls.update();
  renderer.render(scene, camera);
  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    document.getElementById('status-fps').textContent = currentFps + ' FPS';
    frameCount = 0; lastFpsTime = now;
  }
}
animate();

  camera.aspect = container.clientWidth / container.clientHeight;

});

function switchModule(id) {
  currentModule = id;

// 不同模块在地球上叠加不同的点位
function applyModuleOverlay(id) {
  if (id === 'osint' && moduleData.osint) {
    moduleData.osint.hotspots.forEach(h => {
      const color = h.intensity >= 80 ? 0xff3d6e : h.intensity >= 60 ? 0xffb74d : 0xff8a80;
      addPersistentHotspot(h.lat, h.lon, color, h.intensity);
    });
    // 军事调动 -> 航线
    moduleData.osint.military_movements.forEach(m => {
      addFlightLine(m.lat, m.lon, m.lat + 5, m.lon + 10, 0xff8a80);
    });
  } else if (id === 'energy' && moduleData.energy) {
    moduleData.energy.grid_regions.forEach(r => {
      addPersistentHotspot(r.lat, r.lon, 0xffd54f, r.load_pct);
    });
  } else if (id === 'finance' && moduleData.finance) {
    [['纽约',-74,40.7],['伦敦',0,51.5],['东京',139.6,35.6],['上海',121.4,31.2],['香港',114.1,22.3]].forEach(c => {
      addPersistentHotspot(c[2], c[1], 0xffd180, 70);
    });
  } else if (id === 'demand' && moduleData.demand.demands.length) {
    // 已有的需求点会在SSE事件中动态加
  } else if (id === 'specialized' && moduleData.specialized) {
    // 真实地震点（红色，按震级）
    moduleData.specialized.earthquakes.forEach(q => {
      const color = q.magnitude >= 6 ? 0xff1744 : q.magnitude >= 5 ? 0xff5722 : 0xff8a65;
      addPersistentHotspot(q.lat, q.lon, color, Math.min(100, q.magnitude * 12));
    });
    // 真实火灾点（橙色）
    moduleData.specialized.wildfires.forEach(f => {
      addPersistentHotspot(f.lat, f.lon, 0xff6f00, f.score);
    });
    // 真实航班轨迹（青色/红色按军民）
    moduleData.specialized.flights.slice(0, 20).forEach(f => {
      addFlightLine(f.lat, f.lon, f.lat + 6, f.lon + 9, f.type === 'military' ? 0xff3d6e : 0x00e5ff);
    });
  }
}

const logBuffer = [];
function pushLog(msg, type='info') {
  const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  logBuffer.unshift({ t, msg, type });
  if (logBuffer.length > 50) logBuffer.pop();
  // 更新 ticker
  const html = logBuffer.slice(0, 15).map(l =>
    `<span class="lt-time">${l.t}</span><span class="lt-msg ${l.type}">${l.msg}</span><span class="lt-sep">|</span>`
  ).join('');
  document.getElementById('log-ticker').innerHTML = html;
}

function connectSSE() {
  const es = new EventSource('/api/stream');
  es.addEventListener('scan', e => {
    const d = JSON.parse(e.data);
    moduleData.demand.stats.scan++;
    if (d.match) {
      moduleData.demand.stats.match++;
      moduleData.demand.demands.unshift(d);
      if (moduleData.demand.demands.length > 100) moduleData.demand.demands.pop();
      // 颜色映射
      const color = d.score >= 80 ? 0xff3d6e : d.score >= 50 ? 0xffb74d : 0x00e5ff;
      const coord = cityCoords[d.city];
      if (coord) addPulse(coord[1], coord[0], color);
      if (currentModule === 'demand') renderPanel();
    }
    if (d.contact) moduleData.demand.stats.contact++;
    if (d.revenue) moduleData.demand.stats.revenue += d.revenue;
    updateHUD();
  });
  es.addEventListener('log', e => {
    const m = JSON.parse(e.data);
    pushLog(m.msg, m.type);
  });
  // 新模块事件
  es.addEventListener('module_finance', e => {
    moduleData.finance = JSON.parse(e.data);
    if (currentModule === 'finance') renderPanel();
    updateHUD();
  });
  es.addEventListener('module_energy', e => {
    moduleData.energy = JSON.parse(e.data);
    if (currentModule === 'energy') renderPanel();
    updateHUD();
  });
  es.addEventListener('module_osint', e => {
    moduleData.osint = JSON.parse(e.data);
    if (currentModule === 'osint') {
      renderPanel();
      clearPersistentHotspots();
      applyModuleOverlay('osint');
    }
    updateHUD();
  });
  es.addEventListener('module_flights', e => {
    const data = JSON.parse(e.data);
    // 在 finance/osint 模式下显示航班轨迹
    if (currentModule === 'osint') {
      clearFlightLines();
      data.flights.forEach(f => {
        if (f.lat && f.lon) addFlightLine(f.lat, f.lon, f.lat + 8, f.lon + 12, f.type === 'military' ? 0xff3d6e : 0x00ff9f);
      });
    }
  });
  es.addEventListener('module_intel', e => {
    moduleData.intel = JSON.parse(e.data);
    if (currentModule === 'intel') renderPanel();
    updateHUD();
  });
  es.addEventListener('module_ainews', e => {
    moduleData.ainews = JSON.parse(e.data);
    if (currentModule === 'ainews') renderPanel();
    updateHUD();
  });
  es.addEventListener('module_freelance', e => {
    moduleData.freelance = JSON.parse(e.data);
    if (currentModule === 'freelance') renderPanel();
    updateHUD();
  });
  es.addEventListener('module_events', e => {
    const data = JSON.parse(e.data);
    if (data.events && data.events.length) {
      pushLog(`[OSINT] ${data.events[0].text}`, 'warn');
    }
  });
  es.addEventListener('module_specialized', e => {
    moduleData.specialized = JSON.parse(e.data);
    if (currentModule === 'specialized') {
      renderPanel();
      clearPersistentHotspots();
      applyModuleOverlay('specialized');
    }
    updateHUD();
  });
  es.addEventListener('module_aggregator', e => {
    const data = JSON.parse(e.data);
    // 聚合器的威胁分布更新 HUD
    if (data.threat_distribution) {
      const td = data.threat_distribution;
      const total = (td.critical||0) + (td.high||0) + (td.medium||0) + (td.low||0) + (td.info||0);
      if (total > 0) {
        pushLog(`[聚合] ${total}条 严重${td.critical||0} 高危${td.high||0} 中度${td.medium||0}`, 'info');
      }
    }
  });
  es.onerror = () => {
    pushLog('连接断开，3秒后重连...', 'warn');
    setTimeout(connectSSE, 3000);
    es.close();
  };
}

function updateHUD() {
  const d = moduleData.demand.stats;
  document.getElementById('hud-demands').textContent = d.match;
  document.getElementById('hud-revenue').textContent = '$' + d.revenue.toLocaleString();
  // 真实数据源数量（149 个 RSS + 专业源）
  let sources = 0;
  if (moduleData.sources && moduleData.sources.total_sources) {
    sources = moduleData.sources.total_sources;
  }
  if (moduleData.specialized) {
    sources += 4; // USGS + NASA FIRMS + OpenSky + GDELT
  }
  document.getElementById('hud-sources').textContent = sources;
  // 威胁等级
  if (moduleData.osint) {
    const tl = moduleData.osint.global_threat_level;
    const lv = tl >= 70 ? 'L5' : tl >= 55 ? 'L4' : tl >= 40 ? 'L3' : 'L2';
    const el = document.getElementById('hud-threat');
    el.textContent = lv;
    el.className = 'hud-stat-val ' + (lv === 'L5' ? 'danger' : lv === 'L4' ? 'warn' : 'success');
  }
}

// 初始数据拉取（不等 SSE）
async function bootstrap() {
  try {
    // 立即拉数据源统计（轻量）
    const stats = await fetch('/api/feed/variants').then(r => r.json()).catch(() => null);
    if (stats) {
      moduleData.sources = stats;
      updateHUD();
    }
    // 优先拉取快模块
    const [fin, en, os] = await Promise.all([
      fetch('/api/finance').then(r => r.json()).catch(() => null),
      fetch('/api/energy').then(r => r.json()).catch(() => null),
      fetch('/api/osint').then(r => r.json()).catch(() => null),
    ]);
    if (fin) moduleData.finance = fin;
    if (en) moduleData.energy = en;
    if (os) { moduleData.osint = os; applyModuleOverlay(currentModule); }
    updateHUD();
    // 慢模块 + 专业源
    const [intel, news, fl, spec] = await Promise.all([
      fetch('/api/intel').then(r => r.json()).catch(() => null),
      fetch('/api/ainews').then(r => r.json()).catch(() => null),
      fetch('/api/freelance').then(r => r.json()).catch(() => null),
      fetch('/api/specialized').then(r => r.json()).catch(() => null),
    ]);
    if (intel) moduleData.intel = intel;
    if (news) moduleData.ainews = news;
    if (fl) moduleData.freelance = fl;
    if (spec) moduleData.specialized = spec;
    updateHUD();
    if (['intel', 'ainews', 'freelance', 'specialized', 'sources'].includes(currentModule)) {
      renderPanel();
      if (currentModule === 'specialized') applyModuleOverlay('specialized');
    }
  } catch (e) {
    console.warn('bootstrap error', e);
  }
}

// 启动
renderSidebar();
switchModule('demand');
pushLog('NEXUS RADAR 系统启动', 'success');
pushLog('正在接入全球数据源...', 'info');
// 等地球纹理加载完再连 SSE
Promise.all([
  new Promise(r => texLoader.load('/static/textures/earth-blue-marble.jpg', r, undefined, ()=>r())),
  new Promise(r => texLoader.load('/static/textures/earth-topology.png', r, undefined, ()=>r())),
]).then(() => {
  setTimeout(() => { connectSSE(); bootstrap(); }, 500);
});
</script>
